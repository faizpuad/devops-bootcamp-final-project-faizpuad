plugin: amazon.aws.aws_ec2
regions:
  - "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"

filters:
  instance-state-name:
    - running

keyed_groups:
  - key: tags['Role']
    prefix: tag_Role
    separator: "_"

hostnames:
  - instance-id

compose:
  ansible_host: instance_id
  ansible_connection: "'amazon.aws.aws_ssm'"
